plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jlxc.backcamprobe'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.backcamprobe'
        minSdk 23
        targetSdk 29
        versionCode 1
        versionName '0.1-demo'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
